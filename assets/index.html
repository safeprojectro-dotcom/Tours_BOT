  <script>

      pyodide: false,
      multiView: false,
      noCdn: false,

      entrypointBaseUrl: "/",

      pyodideUrl: "/pyodide/pyodide.js",
      webRenderer: "auto",
      fontFallbackBaseUrl: "assets/fonts/", // for Noto Emoji, use Google CDN
      appPackageUrl: "app.tar.gz"
    }

    flet.flutterAppLoaded = new Promise((resolve) => {
      flet.flutterAppResolve = resolve;
    });

    flet.flutterAppLoaded.then((flutterApp) => {
      console.log("Flutter app loaded");
      if (flet.multiView) {
        console.log(flutterApp.addView({
          hostElement: document.querySelector('#view-1'),
          initialData: {

          },

            //maxWidth: Infinity,

        console.log(flutterApp.addView({

  </script>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    (function bootstrapTelegramBridgeBeforeFlet() {
      function loadPythonBootstrapOnce() {
        if (window.__fletPythonBootstrapLoaded) {
          return;
        }
        window.__fletPythonBootstrapLoaded = true;
        var script = document.createElement("script");
        script.src = "python.js";
        document.head.appendChild(script);
      }

      function parseUserIdFromInitData(initDataRaw) {
        if (typeof initDataRaw !== "string" || !initDataRaw) {
          return null;
        }
        try {
          var initParams = new URLSearchParams(initDataRaw);
          var userPayload = initParams.get("user");
          if (!userPayload) {
            return null;
          }
          var parsedUser = JSON.parse(userPayload);
          var parsedInitId = Number(parsedUser && parsedUser.id);
          if (Number.isInteger(parsedInitId) && parsedInitId > 0) {
            return parsedInitId;
          }
        } catch (_err) {
          return null;
        }
        return null;
      }

      function extractBridgeSnapshot() {
        var tg = window.Telegram;
        var webApp = tg && tg.WebApp;
        var hasTelegram = !!tg;
        var hasWebApp = !!webApp;
        var hasInitData = false;
        var resolvedUserId = null;

        if (webApp && typeof webApp.ready === "function") {
          try {
            webApp.ready();
          } catch (_err) {
            // no-op: keep fail-closed behavior
          }
        }

        if (webApp && webApp.initDataUnsafe && webApp.initDataUnsafe.user) {
          hasInitData = true;
          var unsafeId = Number(webApp.initDataUnsafe.user.id);
          if (Number.isInteger(unsafeId) && unsafeId > 0) {
            resolvedUserId = unsafeId;
          }
        }

        if (webApp && typeof webApp.initData === "string" && webApp.initData) {
          hasInitData = true;
          if (!resolvedUserId) {
            resolvedUserId = parseUserIdFromInitData(webApp.initData);
          }
        }

        return {
          tg_bridge_seen: hasTelegram ? "1" : "0",
          tg_bridge_webapp: hasWebApp ? "1" : "0",
          tg_bridge_init: hasInitData ? "1" : "0",
          tg_bridge_user: resolvedUserId ? "1" : "0",
          tg_bridge_user_id: resolvedUserId ? String(resolvedUserId) : null
        };
      }

      function applyBridgeSnapshotToUrl(snapshot) {
        var currentUrl = new URL(window.location.href);
        var params = currentUrl.searchParams;
        var changed = false;

        function toBridgeFlag(value) {
          return value === "1" ? "1" : "0";
        }

        function setIfDifferent(key, value) {
          var normalized = String(value);
          if (params.get(key) !== normalized) {
            params.set(key, normalized);
            changed = true;
          }
        }

        setIfDifferent("tg_bridge_seen", toBridgeFlag(snapshot.tg_bridge_seen));
        setIfDifferent("tg_bridge_webapp", toBridgeFlag(snapshot.tg_bridge_webapp));
        setIfDifferent("tg_bridge_init", toBridgeFlag(snapshot.tg_bridge_init));
        setIfDifferent("tg_bridge_user", toBridgeFlag(snapshot.tg_bridge_user));

        var alreadyHasIdentity =
          params.has("telegram_user_id") ||
          params.has("tg_user_id") ||
          params.has("tguid") ||
          params.has("user_id") ||
          params.has("tg_bridge_user_id");

        if (!alreadyHasIdentity && snapshot.tg_bridge_user_id) {
          setIfDifferent("tg_bridge_user_id", snapshot.tg_bridge_user_id);
        }

        if (changed) {
          currentUrl.search = params.toString();
          window.history.replaceState(window.history.state, "", currentUrl.toString());
        }
      }

      var bridgeAttempts = 0;
      var maxBridgeAttempts = 30;
      var bridgeRetryDelayMs = 75;

      function tryBridgeThenStartFlet() {
        var snapshot = {
          tg_bridge_seen: "0",
          tg_bridge_webapp: "0",
          tg_bridge_init: "0",
          tg_bridge_user: "0",
          tg_bridge_user_id: null
        };
        try {
          snapshot = extractBridgeSnapshot();
          applyBridgeSnapshotToUrl(snapshot);

          if (snapshot.tg_bridge_user === "1") {
            loadPythonBootstrapOnce();
            return;
          }
        } catch (_err) {
          // no-op: keep fail-closed behavior when bridge is unavailable
          applyBridgeSnapshotToUrl(snapshot);
        }

        bridgeAttempts += 1;
        if (bridgeAttempts >= maxBridgeAttempts) {
          if (snapshot) {
            applyBridgeSnapshotToUrl(snapshot);
          }
          loadPythonBootstrapOnce();
          return;
        }
        window.setTimeout(tryBridgeThenStartFlet, bridgeRetryDelayMs);
      }

      tryBridgeThenStartFlet();
    })();
  </script>

  <!-- fletAppConfig -->
</head>

<body>
  <div id="loading">
    <style>
      body {
        inset: 0;
        overflow: hidden;
        margin: 0;
        padding: 0;
        position: fixed;
      }

      #loading {
        align-items: center;
        display: flex;
        height: 100%;
        justify-content: center;
        width: 100%;
      }

      #loading img {
        animation: 1s ease-in-out 0s infinite alternate breathe;
        opacity: .66;
        transition: opacity .4s;
      }

      #loading.main_done img {
        opacity: 1;
      }

      #loading.init_done img {
        animation: .33s ease-in-out 0s 1 forwards zooooom;
        opacity: .05;
      }

      @keyframes breathe {
        from {
          transform: scale(0.4);
          opacity: 1.0;
        }

        to {
          transform: scale(0.35);
          opacity: .7;
        }
      }

      @keyframes zooooom {
        from {
          transform: scale(0.4)
        }

        to {
          transform: scale(10)
        }
      }
    </style>
    <img src="icons/loading-animation.png" alt="Loading..." />
  </div>
  <script src="flutter_bootstrap.js" async></script>
